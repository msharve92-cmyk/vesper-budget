<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Vesper"/>
<meta name="theme-color" content="#0f0d0e"/>
<meta name="description" content="Personal envelope budgeting app"/>
<link rel="manifest" href="vesper.webmanifest"/>
<title>Vesper Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap');

:root{
  --bg:#0a0a0a;
  --card:#1a1a1a;
  --card2:#242424;
  --card3:#2e2e2e;
  --rose:#e05c7a;
  --rose-dark:#b8445f;
  --rose-light:#ed8fa3;
  --text:#ffffff;
  --text2:#cccccc;
  --text3:#777777;
  --success:#5ec97e;
  --warning:#f5c842;
  --danger:#ff6b6b;
  --info:#6bb5ff;
  --border:rgba(255,255,255,0.08);
  --border2:rgba(224,92,122,0.3);
  --radius:20px;
  --radius-sm:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;}

/* ── Topbar ── */
.topbar{background:#0a0a0a;padding:16px 20px;padding-top:calc(16px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:var(--rose);}
.logo span{color:var(--text3);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:400;margin-left:6px;}
.hdr-right{text-align:right;}
.hdr-right .val{font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;color:var(--rose);}
.hdr-right .lbl{font-size:11px;color:var(--text3);}

/* ── Main ── */
.main{height:100%;display:flex;flex-direction:column;max-width:860px;margin:0 auto;width:100%;}
.tab-content{display:none;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(140px + env(safe-area-inset-bottom));}.tab-content.active{display:block;}
.nav-tab{display:none;}

/* ── Calc keyboard ── */
.calc-keyboard{position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;border-top:2px solid var(--border);z-index:350;padding:0 0 calc(env(safe-area-inset-bottom));}
.calc-chips{display:flex;gap:8px;padding:10px 16px 8px;overflow-x:auto;}
.calc-chip{background:var(--card2);border:2px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--text2);white-space:nowrap;cursor:pointer;font-family:'Nunito',sans-serif;touch-action:manipulation;flex-shrink:0;}
.calc-chip.suggested{border-color:var(--rose);color:var(--rose);}
.calc-display{padding:0 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.calc-display-expr{font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:var(--text3);}
.calc-display-val{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:var(--text);}
.calc-grid{display:grid;grid-template-columns:60px 1fr;gap:0;}
.calc-ops{display:flex;flex-direction:column;}
.calc-op{height:60px;background:var(--card2);border:none;color:var(--rose);font-size:22px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;border-right:2px solid var(--border);touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.calc-op:active{background:var(--card3);}
.calc-op.active-op{background:var(--rose);color:#000;}
.calc-nums{display:grid;grid-template-columns:repeat(3,1fr);}
.calc-num{height:60px;background:transparent;border:none;color:var(--text);font-size:22px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;border-top:1px solid var(--border);touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.calc-num:active{background:var(--card2);}
.calc-num.zero{grid-column:span 1;}
.calc-num.dot{color:var(--text2);}
.calc-num.del{font-size:18px;}
.calc-num.next-btn{background:var(--rose);color:#000;font-weight:900;font-size:16px;border-radius:0;}
.calc-session-overlay{position:fixed;inset:0;background:var(--bg);z-index:170;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:320px;}

/* ── Bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:2px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:10px 8px calc(12px + env(safe-area-inset-bottom));z-index:300;}
.bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;flex:1;padding:4px 0;}
.bnav-icon{font-size:20px;line-height:1;}
.bnav-label{font-size:11px;color:var(--text3);font-weight:600;}
.bottom-nav-item.active .bnav-label{color:var(--rose);}
.bottom-nav-item.active .bnav-icon{filter:drop-shadow(0 0 8px rgba(255,154,108,0.6));}
.bnav-center{flex:0 0 70px;}
.bnav-fab{width:58px;height:58px;border-radius:50%;background:var(--rose);color:#000;font-size:26px;font-weight:900;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(255,154,108,0.45);line-height:1;margin-top:-24px;transition:transform .2s;border:none;}

/* ── Spend bar ── */
.spend-bar-card{background:var(--card);border-radius:0;padding:22px 20px 18px;}
.spend-bar-title{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:var(--text);margin-bottom:2px;}
.spend-bar-sub{font-size:13px;color:var(--text3);margin-bottom:14px;}
.spend-bar-track{height:12px;background:var(--card3);border-radius:8px;overflow:hidden;margin-bottom:10px;}
.spend-bar-fill{height:100%;background:var(--rose);border-radius:8px;}
.spend-bar-legend{display:flex;gap:16px;}
.spend-bar-leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);font-weight:600;}
.spend-bar-leg-dot{width:8px;height:8px;border-radius:50%;}

/* ── Unallocated banner ── */
.unalloc-banner{background:var(--card);padding:18px 20px;margin-top:3px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.unalloc-amount{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:var(--rose);}
.unalloc-label{font-size:12px;color:var(--text3);margin-top:3px;font-weight:600;}
.unalloc-btn{background:var(--rose);color:#000;border:none;border-radius:50px;padding:12px 22px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;touch-action:manipulation;white-space:nowrap;}

/* ── Savings pool ── */
.savings-pool-row{background:var(--card);padding:16px 20px;margin-top:3px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.spr-val{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:var(--info);}
.spr-sub{font-size:12px;color:var(--text3);margin-top:2px;font-weight:600;}
.spr-right{display:flex;gap:8px;align-items:center;}

/* ── Payday banner ── */
.payday-banner{background:var(--card);padding:16px 20px;margin-top:3px;display:flex;gap:10px;}
.pay-slot{flex:1;background:var(--card2);border-radius:var(--radius-sm);padding:12px 14px;}
.pay-slot.next{background:rgba(255,154,108,0.12);border:2px solid var(--rose-dark);}
.ps-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:4px;font-weight:700;}
.ps-date{font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--text2);}
.pay-slot.next .ps-date{color:var(--rose);}
.ps-days{font-size:11px;color:var(--text3);margin-top:3px;font-weight:600;}

/* ── Section headers ── */
.section-header{display:flex;align-items:baseline;justify-content:space-between;padding:24px 20px 12px;}
.section-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:var(--rose);}
.section-total{font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:var(--text2);}
.funded-count{font-size:12px;color:var(--text3);font-weight:600;}

/* ── Envelope grid ── */
.envelope-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 20px 4px;}

/* ── Envelope cards ── */
.envelope-card{background:var(--card);border-radius:14px;padding:12px 13px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:background .15s;}
.envelope-card:active{background:var(--card2);}
.env-header{display:flex;flex-direction:column;gap:8px;}
.env-icon-wrap{font-size:22px;line-height:1;}
.env-name{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.env-balance{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:var(--rose);}
.env-balance.negative{color:var(--danger);}
.env-of{font-size:11px;color:var(--text3);font-weight:600;}
.env-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px;}

/* ── Progress bar ── */
.progress-bar{height:5px;background:var(--card3);border-radius:3px;margin-top:12px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .4s;}

/* ── Detail screen ── */
.detail-screen{position:fixed;inset:0;background:var(--bg);z-index:150;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);padding-bottom:calc(80px + env(safe-area-inset-bottom));}
.detail-screen.open{transform:translateX(0);}
.detail-topbar{display:flex;align-items:center;gap:12px;padding:16px 20px;padding-top:calc(16px + env(safe-area-inset-top));position:sticky;top:0;background:rgba(10,10,10,0.97);z-index:10;}
.detail-back{background:var(--card);border:none;color:var(--rose);font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;padding:10px 18px;border-radius:50px;cursor:pointer;touch-action:manipulation;}
.detail-hero{padding:28px 20px 24px;}
.detail-hero-icon{font-size:44px;margin-bottom:12px;line-height:1;}
.detail-hero-type{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:700;margin-bottom:6px;}
.detail-hero-balance{font-family:'Nunito',sans-serif;font-size:44px;font-weight:900;color:var(--rose);line-height:1.1;}
.detail-hero-balance.negative{color:var(--danger);}
.detail-hero-sub{font-size:15px;color:var(--text3);margin-top:8px;font-weight:600;}
.detail-progress-wrap{padding:0 20px 20px;}
.detail-progress-bar{height:10px;background:var(--card2);border-radius:6px;overflow:hidden;}
.detail-progress-fill{height:100%;border-radius:6px;}
.detail-chip-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px;}
.detail-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin:0 0 3px;}
.detail-stat{background:var(--card);padding:18px 16px;}
.detail-stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px;font-weight:700;}
.detail-stat-val{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:var(--text);}
.detail-actions{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:3px;}
.detail-action-btn{background:var(--card);border:none;color:var(--text);font-family:'DM Sans',sans-serif;padding:20px 18px;cursor:pointer;touch-action:manipulation;text-align:left;transition:background .15s;}
.detail-action-btn:active{background:var(--card2);}
.detail-action-icon{font-size:26px;margin-bottom:10px;}
.detail-action-label{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;}
.detail-action-sub{font-size:12px;color:var(--text3);margin-top:4px;font-weight:500;}
.detail-action-edit{grid-column:span 2;display:flex;align-items:center;justify-content:space-between;}
.detail-tx-section{padding:24px 20px;}
.detail-tx-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:var(--text);margin-bottom:14px;}
.detail-tx-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);}
.detail-tx-row:last-child{border-bottom:none;}
.detail-tx-left{flex:1;min-width:0;}
.detail-tx-desc{font-size:15px;color:var(--text);font-weight:600;}
.detail-tx-date{font-size:12px;color:var(--text3);margin-top:4px;font-weight:500;}
.detail-tx-amt{font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:var(--danger);flex-shrink:0;}
.detail-tx-amt.pos{color:var(--success);}
.detail-empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:15px;font-weight:600;}

/* ── Badges ── */
.status-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:50px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;font-family:'Nunito',sans-serif;}
.badge-funded{background:rgba(94,201,126,.2);color:var(--success);}
.badge-ontrack{background:rgba(245,200,66,.2);color:var(--warning);}
.badge-behind{background:rgba(255,107,107,.2);color:var(--danger);}
.due-chip{font-size:11px;color:var(--text3);font-weight:700;}
.due-chip.urgent{color:var(--danger);}
.cover-chip{font-size:11px;padding:3px 8px;border-radius:50px;font-weight:700;}
.cover-ok{color:var(--success);}
.cover-warn{color:var(--danger);}
.bill-paid-chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:4px 10px;border-radius:50px;font-weight:800;text-transform:uppercase;cursor:pointer;touch-action:manipulation;font-family:'Nunito',sans-serif;}
.bill-paid-chip.paid{background:rgba(94,201,126,.2);color:var(--success);}
.bill-paid-chip.unpaid{background:rgba(255,255,255,.08);color:var(--text3);}

/* ── Buttons ── */
.btn{border:2px solid var(--border2);background:var(--card);color:var(--rose);padding:10px 18px;border-radius:50px;cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif;font-weight:800;transition:all .2s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.btn:hover{background:var(--card2);}
.btn-primary{background:var(--rose);border-color:var(--rose);color:#000;}
.btn-primary:hover{background:var(--rose-dark);}
.btn-info{background:rgba(107,181,255,.15);border-color:rgba(107,181,255,.3);color:var(--info);}
.btn-danger{border-color:rgba(255,107,107,.3);color:var(--danger);background:rgba(255,107,107,.1);}
.btn-sm{padding:7px 14px;font-size:12px;}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal{background:var(--bg);width:100%;max-width:480px;padding:0;flex:1;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:var(--rose);margin-bottom:16px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px;display:block;font-weight:700;}
.form-input,.form-select{width:100%;background:var(--card2);border:2px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;appearance:none;}
.form-input:focus,.form-select:focus{border-color:var(--rose);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.emoji-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.emoji-opt{width:40px;height:40px;border-radius:12px;background:var(--card2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}
.emoji-opt.selected{border-color:var(--rose);background:rgba(255,154,108,.15);}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.sib{background:var(--card2);border-radius:var(--radius-sm);padding:16px;margin-bottom:14px;}
.si-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;}
.si-val{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:var(--text);}
.si-val.warn{color:var(--danger);}
.rec-box{background:rgba(255,154,108,0.08);border-left:4px solid var(--rose-dark);border-radius:var(--radius-sm);padding:12px 14px;margin-top:10px;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.rec-amount{font-family:'Nunito',sans-serif;font-weight:900;color:var(--rose);font-size:15px;}
.warning-toast{background:rgba(255,107,107,.1);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:12px;font-weight:600;}
.savings-note{font-size:12px;color:var(--info);background:rgba(107,181,255,.08);border-radius:var(--radius-sm);padding:9px 13px;margin-bottom:10px;font-weight:600;}

/* ── Income panel ── */
.income-panel{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:12px;}
.income-panel-title{font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.quick-btn{border:2px solid var(--border2);background:var(--card2);color:var(--rose);padding:10px 16px;border-radius:50px;cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif;font-weight:800;white-space:nowrap;touch-action:manipulation;}
.income-log-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
.income-log-row:last-child{border-bottom:none;}
.il-name{font-size:14px;color:var(--text);font-weight:600;}
.il-date{font-size:11px;color:var(--text3);font-weight:500;}
.il-amt{font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:var(--success);}
.il-type{font-size:10px;padding:3px 8px;border-radius:50px;font-weight:800;text-transform:uppercase;margin-left:6px;font-family:'Nunito',sans-serif;}
.il-type.biweekly{background:rgba(255,154,108,.15);color:var(--rose);}
.il-type.retainer{background:rgba(107,181,255,.15);color:var(--info);}
.il-type.other{background:rgba(94,201,126,.15);color:var(--success);}

/* ── Transaction log ── */
.txlog-filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.txlog-filter-btn{border:2px solid var(--border);background:var(--card);color:var(--text3);padding:8px 16px;border-radius:50px;cursor:pointer;font-size:12px;font-family:'Nunito',sans-serif;font-weight:800;white-space:nowrap;touch-action:manipulation;}
.txlog-filter-btn.active{background:var(--rose);color:#000;border-color:var(--rose);}
.txlog-search{flex:1;min-width:140px;background:var(--card);border:2px solid var(--border);border-radius:50px;padding:9px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.txlog-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:7px;}
.txlog-icon{width:40px;height:40px;border-radius:12px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.txlog-info{flex:1;min-width:0;}
.txlog-desc{font-size:14px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txlog-env{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500;}
.txlog-right{text-align:right;flex-shrink:0;}
.txlog-amt{font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:var(--danger);}
.txlog-amt.pos{color:var(--success);}
.txlog-date{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500;}
.txlog-actions{display:flex;gap:4px;flex-shrink:0;}
.txlog-empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:15px;font-weight:600;}
.txlog-group-label{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:var(--text3);margin-bottom:8px;margin-top:4px;}

/* ── Calendar ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:0 20px;}
.cal-nav-btn{width:42px;height:42px;border-radius:50%;border:2px solid var(--border);background:var(--card);color:var(--rose);cursor:pointer;font-size:18px;font-weight:800;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.cal-month-label{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:var(--text);}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px;padding:0 20px;}
.cal-wd{text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);padding:4px 0;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 20px;}
.cal-cell{min-height:52px;background:var(--card);border-radius:12px;padding:6px;cursor:pointer;display:flex;flex-direction:column;gap:2px;overflow:hidden;touch-action:manipulation;}
.cal-cell:active{background:var(--card2);}
.cal-cell.empty{background:transparent;pointer-events:none;}
.cal-cell.today{background:rgba(255,154,108,0.18);border:2px solid var(--rose);}
.cal-cell.other-month{opacity:0.25;}
.cal-day-num{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--text2);}
.cal-cell.today .cal-day-num{color:var(--rose);}
.cal-item{font-size:8px;color:var(--text3);background:rgba(255,255,255,0.07);border-radius:4px;padding:1px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;}
.cal-item.bill{background:rgba(255,107,107,.2);color:var(--danger);}
.cal-item.bill-paid{background:rgba(94,201,126,.2);color:var(--success);}
.cal-item.pay{background:rgba(255,154,108,.2);color:var(--rose);}
.cal-item.ret{background:rgba(107,181,255,.2);color:var(--info);}
.cal-more{font-size:8px;color:var(--text3);font-weight:700;}
.cal-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:16px;padding:14px 20px;font-size:12px;color:var(--text3);font-weight:600;}
.cal-legend-item{display:flex;align-items:center;gap:6px;}
.cal-legend-dot{width:9px;height:9px;border-radius:50%;}
.cal-day-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card2);border-radius:var(--radius-sm);margin-bottom:7px;}
.cal-day-item-icon{width:34px;height:34px;border-radius:10px;background:var(--card3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.cal-day-item-info{flex:1;min-width:0;}
.cal-day-item-title{font-size:14px;color:var(--text);font-weight:600;}
.cal-day-item-sub{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500;}
.cal-day-item-amt{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;flex-shrink:0;}

/* ── Insights ── */
.insight-card{background:var(--card);border-radius:var(--radius);padding:0;margin-bottom:10px;overflow:hidden;}
.insight-card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;touch-action:manipulation;}
.insight-title{font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:var(--text);}

.insight-chevron.open{transform:rotate(180deg);}
.insight-body{font-size:13px;color:var(--text2);line-height:1.6;padding:0 18px 16px;}
.trend-bar-row{display:flex;align-items:center;gap:10px;margin-top:8px;}
.trend-label{font-size:12px;color:var(--text2);width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
.trend-bar-bg{flex:1;height:6px;background:var(--card2);border-radius:4px;overflow:hidden;}
.trend-bar-fill{height:100%;border-radius:4px;}
.trend-val{font-size:11px;color:var(--text2);width:60px;text-align:right;flex-shrink:0;font-weight:600;}
.period-toggle{display:flex;gap:4px;background:var(--card2);border-radius:50px;padding:4px;}
.period-btn{padding:6px 14px;border-radius:50px;font-size:12px;font-weight:800;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Nunito',sans-serif;}

/* ── Session ── */

<script>
const EMOJIS=['🏠','💡','📱','🚗','💳','🌐','📦','🎵','☁️','🤖','💰','✈️','🛒','🍔','👗','💊','🎓','🐾','🎮','☕','⛽','💧','🔔','🏥','🐕','🎨','🏋️','📚'];

function getAnchor(){
  const d=S&&S.paySchedule?S.paySchedule.anchorDate:'2026-04-17';
  const p=d.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
}
function getRetainerDays(){
  return S&&S.paySchedule?S.paySchedule.retainerDays:[1,20];
}
function getBiweeklyEnabled(){
  return S&&S.paySchedule?S.paySchedule.biweeklyEnabled:true;
}
function getRetainerEnabled(){
  return S&&S.paySchedule?S.paySchedule.retainerEnabled:true;
}

function today(){return new Date();}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtShort(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtFull(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtIso(d){return d.toISOString().split('T')[0];}
function daysUntil(d){const t=today();t.setHours(0,0,0,0);return Math.ceil((d-t)/86400000);}
function fmt(n,d=2){return(n<0?'-':'')+'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}

function getPaydays(count){
  const t=today();t.setHours(0,0,0,0);
  const days=[];
  if(getBiweeklyEnabled()){
    const ANCHOR=getAnchor();
    const diffMs=t-ANCHOR;
    const diffDays=Math.ceil(diffMs/86400000);
    const cyclePos=((diffDays%14)+14)%14;
    let bw=addDays(t,cyclePos===0?0:14-cyclePos);
    if(bw<=t)bw=addDays(bw,14);
    for(let i=0;i<10;i++){days.push({date:new Date(bw),type:'biweekly',label:'Paycheck'});bw=addDays(bw,14);}
  }
  if(getRetainerEnabled()){
    const rdays=getRetainerDays();
    for(let m=0;m<4;m++){
      const mo=t.getMonth()+m;
      const yr=t.getFullYear()+Math.floor(mo/12);
      rdays.forEach(day=>{
        const d=new Date(yr,mo%12,day);
        d.setHours(0,0,0,0);
        if(d>t)days.push({date:d,type:'retainer',label:'Retainer'});
      });
    }
  }
  days.sort((a,b)=>a.date-b.date);
  return count?days.slice(0,count):days;
}

function getDaysLeft(dueDay){
  const t=today();t.setHours(0,0,0,0);
  const due=new Date(t.getFullYear(),t.getMonth(),dueDay);
  due.setHours(0,0,0,0);
  if(due<=t)due.setMonth(due.getMonth()+1);
  return Math.ceil((due-t)/86400000);
}

function getNextPayBeforeDue(dueDay){
  const t=today();t.setHours(0,0,0,0);
  const due=new Date(t.getFullYear(),t.getMonth(),dueDay);
  due.setHours(0,0,0,0);
  if(due<=t)due.setMonth(due.getMonth()+1);
  const pays=getPaydays().filter(p=>p.date<due);
  return pays.length?pays[pays.length-1]:null;
}

// --- DEFAULT STATE ---
const DEFAULT_STATE = {
  unallocated:0, savingsPool:0, period:30, expandedId:null, nextId:20, modal:null,
  incomeLog:[], billPaid:{},
  paySchedule:{
    biweeklyEnabled:true,
    anchorDate:'2026-04-17',
    retainerEnabled:true,
    retainerDays:[1,20]
  },
  envelopes:[
    {id:1, name:'Rent',         icon:'🏠',type:'fixed',  target:235,   balance:0,dueDay:1,  transactions:[],history:[235,235,235]},

const STORAGE_KEY = 'vesper_budget_v1';
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return JSON.parse(JSON.stringify(DEFAULT_STATE));
    const saved=JSON.parse(raw);
    // merge — keep defaults for modal/expandedId
    saved.modal=null;saved.expandedId=null;
    return saved;
  }catch(e){return JSON.parse(JSON.stringify(DEFAULT_STATE));}
}
let saveTimeout=null;
function saveState(){
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(()=>{
    try{
      const toSave=Object.assign({},S);
      delete toSave.modal;delete toSave.expandedId;
      localStorage.setItem(STORAGE_KEY,JSON.stringify(toSave));
      const ind=document.getElementById('save-indicator');
      ind.classList.add('show');
      setTimeout(()=>ind.classList.remove('show'),1500);
    }catch(e){}
  },400);
}

function getSpendingAlerts(){

    } else if(env.target>0&&env.balance/env.target<=0.2){
      const pct=Math.round((env.balance/env.target)*100);
      alerts.push({envId:env.id,icon:env.icon,name:env.name,msg:`${env.icon} ${env.name} is at ${pct}% — only ${fmt(env.balance)} left`,level:'warn'});
    }
  });
  S.envelopes.filter(e=>e.type==='fixed').forEach(env=>{
    if(env.dueDay){
      const dl=getDaysLeft(env.dueDay);
      if(dl<=3&&env.balance<env.target){
        alerts.push({envId:env.id,icon:env.icon,name:env.name,msg:`${env.icon} ${env.name} due in ${dl}d — ${fmt(Math.max(0,env.target-env.balance))} short`,level:'danger'});
      }
    }
  });
  return alerts;
}

// ---- HISTORY ----
let historyOpenMonths={};
function renderHistory(){
  const container=document.getElementById('history-panel');
  // Group all transactions by month
  const months={};
  const addTx=(envName,icon,tx)=>{
    const parts=tx.date.split(' ');
    // date is like "Apr 17" — attach current year context
    // We'll group by the raw date string's month portion
    const key=tx.date; // "Apr 17" — extract month
    const monthKey=tx.date.length>=3?tx.date.substring(0,3):'???';
    // Build a proper month key from transaction date
    // Transactions store fmtShort dates like "Apr 17"
    const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const mIdx=monthNames.indexOf(monthKey);
    const yr=today().getFullYear(); // approximate
    const fullKey=`${yr}-${String(mIdx+1).padStart(2,'0')}`;
    const label=mIdx>=0?monthNames[mIdx]+' '+yr:'Unknown';
    if(!months[fullKey])months[fullKey]={label,txs:[],spent:0,income:0};
    months[fullKey].txs.push({envName,icon,desc:tx.desc,amount:tx.amount,date:tx.date});
    if(tx.amount<0)months[fullKey].spent+=Math.abs(tx.amount);
    else months[fullKey].income+=tx.amount;
  };

  // Filter out funding/session noise — only real spends
  const fundingDescs=['Funded','Budget Session','Added Directly','Direct Deposit','Returned to unallocated','Deposit'];
  const isReal=desc=>!fundingDescs.includes(desc)&&!desc.startsWith('Transfer')&&!desc.startsWith('Budget Session');

  S.envelopes.forEach(env=>env.transactions.filter(t=>isReal(t.desc)).forEach(t=>addTx(env.name,env.icon,t)));
  S.savings.forEach(sav=>sav.transactions.filter(t=>isReal(t.desc)).forEach(t=>addTx(sav.name,sav.icon,t)));

  // Also add income log
  S.incomeLog.forEach(l=>{
    const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const parts=l.date.split(' ');
    const mIdx=monthNames.indexOf(parts[0]);
    const yr=today().getFullYear();
    const fullKey=`${yr}-${String(mIdx+1).padStart(2,'0')}`;
    const label=mIdx>=0?monthNames[mIdx]+' '+yr:'Unknown';
    if(!months[fullKey])months[fullKey]={label,txs:[],spent:0,income:0};
    months[fullKey].income+=l.amount;
    months[fullKey].txs.push({envName:'Income',icon:'💵',desc:l.label,amount:l.amount,date:l.date});
  });

  const sortedKeys=Object.keys(months).sort((a,b)=>b.localeCompare(a));

  if(!sortedKeys.length){
    container.innerHTML=`<div style="text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;">No history yet. Transactions will appear here as you log them.</div>`;
    return;
  }

  let html=`<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--rose);font-weight:600;margin-bottom:12px;">Spending History</div>`;

  sortedKeys.forEach(key=>{
    const m=months[key];
    const open=historyOpenMonths[key];
    const spends=m.txs.filter(t=>t.amount<0);
    html+=`<div class="history-month-header" onclick="historyOpenMonths['${key}']=!historyOpenMonths['${key}'];renderHistory()">
      <div>
        <div class="history-month-label">${m.label}</div>
        <div class="history-month-total">${fmt(m.spent)} spent · ${fmt(m.income)} in</div>
      </div>
      <span style="color:var(--text3);font-size:12px;">${open?'▲':'▼'}</span>
    </div>`;
    if(open){
      html+=`<div style="margin-bottom:12px;padding:0 4px;">`;
      // Group by envelope
      const byEnv={};
      spends.forEach(t=>{
        if(!byEnv[t.envName])byEnv[t.envName]={icon:t.icon,txs:[]};
        byEnv[t.envName].txs.push(t);
      });
      Object.entries(byEnv).forEach(([name,data])=>{
        const total=data.txs.reduce((a,t)=>a+Math.abs(t.amount),0);
        html+=`<div class="history-env-row">
          <div style="display:flex;align-items:center;gap:7px;">
            <span style="font-size:14px;">${data.icon}</span>
            <div class="history-env-name">${name}</div>
          </div>
          <div class="history-env-amt">${fmt(total)}</div>
        </div>`;
      });
      // Income entries
      const incomes=m.txs.filter(t=>t.amount>0&&t.envName==='Income');
      if(incomes.length){
        html+=`<div style="margin-top:6px;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);padding:4px 0;">Income</div>`;
        incomes.forEach(t=>{
          html+=`<div class="history-env-row">
            <div style="display:flex;align-items:center;gap:7px;"><span>💵</span><div class="history-env-name">${t.desc}</div></div>
            <div style="font-size:12px;font-weight:500;color:var(--success);">+${fmt(t.amount)}</div>
          </div>`;
        });
      }
      html+=`</div>`;
    }
  });

  container.innerHTML=html;
}

function updateSessionTotal(val){
  const amt=parseFloat(val)||0;
  const prev=document.getElementById('session-total-preview');
  if(amt>0){
    const fixed=S.envelopes.filter(e=>e.type==='fixed');
    const billsTotal=fixed.reduce((a,e)=>a+e.target,0);
    const remaining=amt-billsTotal;
    prev.innerHTML=`<div style="background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 13px;font-size:12px;color:var(--text2);">

    </div>`;
  } else {
    prev.innerHTML='';
  }
}

function startSessionAllocation(){
  const amt=parseFloat(document.getElementById('session-total-input').value);
  if(isNaN(amt)||amt<=0){alert('Enter your total balance to continue.');return;}

  const allocs=[];
  const nextPay=getPaydays(1)[0];

  // Fixed bills
  S.envelopes.filter(e=>e.type==='fixed').forEach(env=>{
    let suggested=env.target;
    let urgent=false;
    let note='';
    if(env.dueDay){
      const dl=getDaysLeft(env.dueDay);
      const daysToNextPay=nextPay?daysUntil(nextPay.date):999;
      if(dl<=daysToNextPay||dl<=3){
        // Due before next pay — need full amount now
        suggested=env.target;
        urgent=true;
        note=`Due in ${dl}d`;
      } else {
        // Due after next pay — only fund proportional share now
        // How many pay periods until due?
        const payFreq=S.paySchedule&&S.paySchedule.biweeklyEnabled?14:30;
        const paysUntilDue=Math.max(1,Math.ceil(dl/payFreq));
        const perPay=Math.ceil((env.target/paysUntilDue)*100)/100;
        suggested=Math.min(perPay,env.target);
        urgent=false;
        note=`Due in ${dl}d · next pay in ${daysToNextPay}d`;
      }
    } else {
      suggested=env.target;
      note='monthly bill';
    }
    allocs.push({id:env.id,icon:env.icon,name:env.name,type:'fixed',suggested,amount:0,urgent,note,target:env.target});
  });

  // Variable — start at 0, suggest target
  S.envelopes.filter(e=>e.type==='variable').forEach(env=>{
    allocs.push({id:env.id,icon:env.icon,name:env.name,type:'variable',suggested:env.target||0,amount:0,urgent:false,note:'variable spending',target:env.target});
  });

  // Savings — start at 0, suggest 0
  S.savings.forEach(sav=>{
    allocs.push({id:sav.id,icon:sav.icon,name:sav.name,type:'savings',suggested:0,amount:0,urgent:false,note:'savings goal',target:sav.target});
  });

  BS={total:amt,allocs};
  renderSessionAllocation();
}

function renderSessionAllocation(){
  if(!BS)return;
  const panel=document.getElementById('session-panel');
  const allocated=BS.allocs.reduce((a,e)=>a+parseFloat(e.amount||0),0);
  const remaining=BS.total-allocated;
  const done=Math.abs(remaining)<0.01;
  const over=remaining<-0.01;

  const urgentRows=BS.allocs.filter(a=>a.urgent);
  const fixedRows=BS.allocs.filter(a=>a.type==='fixed'&&!a.urgent);
  const variableRows=BS.allocs.filter(a=>a.type==='variable');
  const savingsRows=BS.allocs.filter(a=>a.type==='savings');

  // Build all rows with explicit global indices
  const allRowsWithIdx=BS.allocs.map((a,idx)=>({a,idx}));

  const buildRow=({a,idx})=>{
    const amt=parseFloat(a.amount||0);
    const hasSuggestion=a.suggested>0;
    return`
    <div class="session-row${a.urgent?' urgent':''}" onclick="openCalcKeyboard(${idx})" style="cursor:pointer;">
      <div class="session-row-icon">${a.icon}</div>
      <div class="session-row-info">
        <div class="session-row-name">${a.name}${a.urgent?` <span style="font-size:9px;color:var(--danger);font-weight:700;">⚠ due soon</span>`:''}</div>
        <div class="session-row-sub">${a.note}${hasSuggestion?` · <span style="color:var(--rose);font-weight:700;">suggest ${fmt(a.suggested)}</span>`:''}</div>
      </div>
      <div style="font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:${amt===0?'var(--text3)':'var(--rose)'};flex-shrink:0;">${fmt(amt)}</div>
    </div>`;};

  panel.innerHTML=`
    <div class="session-header">
      <div class="session-header-title">Allocate Funds</div>
      <div class="session-header-sub">Adjust each envelope. Every dollar must be assigned.</div>
      <div class="session-balance-row">
        <div>
          <div class="session-balance-label">Remaining to assign</div>
          <div class="session-balance-val${done?' zero':over?' over':''}">${fmt(Math.abs(remaining))}${over?' over':''}</div>
        </div>
        <div style="text-align:right;">
          <div class="session-balance-label">Total balance</div>
          <div style="font-size:18px;font-weight:600;color:var(--text2);">${fmt(BS.total)}</div>
        </div>
      </div>
    </div>

    ${allRowsWithIdx.filter(({a})=>a.type==='fixed').length?`<div class="session-section-title">Fixed Bills</div>${allRowsWithIdx.filter(({a})=>a.type==='fixed').map(buildRow).join('')}`:''}
    ${allRowsWithIdx.filter(({a})=>a.type==='variable').length?`<div class="session-section-title">Variable Spending</div>${allRowsWithIdx.filter(({a})=>a.type==='variable').map(buildRow).join('')}`:''}

function updateSessionAlloc(idx,val){

function adjustSessionAlloc(idx,dir){
  const current=parseFloat(BS.allocs[idx].amount)||0;
  const target=BS.allocs[idx].target||0;
  const inc=target>=100?10:target>=25?5:1;
  BS.allocs[idx].amount=Math.max(0,Math.round((current+(dir*inc))*100)/100);
  renderSessionAllocation();
}

// ---- CALC KEYBOARD ----
let calcState={activeIdx:null,value:'0',op:null,opValue:null};
function openCalcKeyboard(idx){
  if(!BS||!BS.allocs||!BS.allocs[idx])return;
  // Start display at 0, not the existing amount
  calcState={activeIdx:idx,value:'0',op:null,opValue:null};
  updateCalcDisplay();
  updateCalcChips(idx);
  document.getElementById('calc-keyboard').style.display='block';
  document.getElementById('bottom-nav').style.display='none';
  const sp=document.getElementById('session-panel');
  if(sp)sp.style.pointerEvents='none';
  const ts=document.getElementById('tab-session');
  if(ts){ts.style.overflow='hidden';ts.style.overflowY='hidden';}
}
function closeCalcKeyboard(){
  calcState={activeIdx:null,value:'0',op:null,opValue:null};
  document.getElementById('calc-keyboard').style.display='none';
  document.getElementById('bottom-nav').style.display='flex';
  const sp=document.getElementById('session-panel');
  if(sp)sp.style.pointerEvents='';
  const ts=document.getElementById('tab-session');
  if(ts){ts.style.overflow='';ts.style.overflowY='auto';}
}
function getSessionRemaining(){
  if(!BS)return 0;
  const allocated=BS.allocs.reduce((a,e)=>a+(parseFloat(e.amount)||0),0);
  return Math.round((BS.total-allocated)*100)/100;
}
function updateCalcDisplay(){
  const val=parseFloat(calcState.value)||0;
  const expr=calcState.op&&calcState.opValue!==null?`${fmt(calcState.opValue)} ${calcState.op}`:'';
  document.getElementById('calc-display-val').textContent=fmt(val);
  document.getElementById('calc-expr').textContent=expr;
  document.getElementById('calc-op-add').className='calc-op'+(calcState.op==='+'?' active-op':'');
  document.getElementById('calc-op-sub').className='calc-op'+(calcState.op==='-'?' active-op':'');
  // Update remaining
  const remEl=document.getElementById('calc-remaining');
  if(remEl){
    const rem=getSessionRemaining();
    remEl.textContent=`${fmt(rem)} remaining`;
    remEl.style.color=rem<0?'var(--danger)':rem===0?'var(--success)':'var(--text2)';
  }
}
function updateCalcChips(idx){
  const a=BS.allocs[idx];
  const prev=parseFloat(a.amount)||0;
  const suggested=parseFloat(a.suggested)||0;
  const rem=getSessionRemaining();
  const chips=document.getElementById('calc-chips');
  chips.innerHTML=`
    <div class="calc-chip" onclick="calcSetVal(0)">$0 · empty</div>
    ${suggested>0?`<div class="calc-chip suggested" onclick="calcSetVal(${suggested})">✦ ${fmt(suggested)} suggested</div>`:''}
    ${a.target>0&&a.target!==suggested?`<div class="calc-chip" onclick="calcSetVal(${a.target})">${fmt(a.target)} target</div>`:''}
    ${rem>0?`<div class="calc-chip" onclick="calcSetVal(${Math.round((prev+rem)*100)/100})">${fmt(rem)} remaining</div>`:''}
    ${prev>0?`<div class="calc-chip" onclick="calcSetVal(${prev})">${fmt(prev)} current</div>`:''}
  `;
}
function calcSetVal(v){
  const n=parseFloat(v)||0;
  calcState.value=n===0?'0':String(n);
  calcState.op=null;calcState.opValue=null;
  updateCalcDisplay();
}
function calcKey(k){
  const v=calcState.value;
  if(v==='0'||v===''){ calcState.value=(k==='.'?'0.':k); }
  else if(k==='.'&&v.includes('.'))return;
  else calcState.value=v+k;
  updateCalcDisplay();
}
function calcDel(){
  if(calcState.value.length<=1)calcState.value='0';
  else calcState.value=calcState.value.slice(0,-1);
  updateCalcDisplay();
}
function calcOp(op){
  const cur=parseFloat(calcState.value)||0;
  if(calcState.op&&calcState.opValue!==null){
    const result=calcState.op==='+'?calcState.opValue+cur:Math.max(0,calcState.opValue-cur);
    calcState.opValue=result;
    calcState.value=String(result.toFixed(2));
  } else {
    calcState.opValue=cur;
  }
  calcState.op=op;
  calcState.value='0';
  updateCalcDisplay();
}
function calcConfirm(){
  const idx=calcState.activeIdx;
  if(idx===null)return;
  let result=parseFloat(calcState.value)||0;
  if(calcState.op&&calcState.opValue!==null){
    result=calcState.op==='+'?calcState.opValue+result:Math.max(0,calcState.opValue-result);
  }
  BS.allocs[idx].amount=Math.round(result*100)/100;
  closeCalcKeyboard();
  renderSessionAllocation();
}
function confirmSession(){
  if(!BS)return;
  S.unallocated=0;
  BS.allocs.forEach(a=>{
    const allEnvs=[...S.envelopes,...S.savings];
    const env=allEnvs.find(e=>e.id===a.id);
    if(env){
      const amt=parseFloat(a.amount)||0;
      env.balance=amt;
      env.transactions.unshift({desc:'Budget Session',amount:amt,date:fmtShort(today()),ts:Date.now()});
    }
  });
  BS=null;
  saveState();
  showTab('dashboard',document.getElementById('bnav-dashboard'));
  render();
}

function cancelSession(){
  BS=null;
  if(document.getElementById('calc-keyboard').style.display!=='none')closeCalcKeyboard();
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab,.bottom-nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-dashboard').classList.add('active');
  document.getElementById('bnav-dashboard').classList.add('active');
  render();
}

function doTransfer(){
  const m=S.modal;
  const allEnvs=[...S.envelopes,...S.savings];
  const fromEnv=allEnvs.find(e=>e.id===m.fromId);
  const toEnv=allEnvs.find(e=>e.id===m.toId);
  const amt=parseFloat(m.amount);
  if(isNaN(amt)||amt<=0){alert('Enter a valid amount.');return;}
  if(!toEnv){alert('Select a destination envelope.');return;}
  if(fromEnv.id===toEnv.id){alert('Cannot transfer to the same envelope.');return;}
  fromEnv.balance-=amt;
  toEnv.balance+=amt;
  const date=fmtShort(today());
  fromEnv.transactions.unshift({desc:`Transfer to ${toEnv.name}`,amount:-amt,date});
  toEnv.transactions.unshift({desc:`Transfer from ${fromEnv.name}`,amount:amt,date});
  closeMB();saveState();render();
}

function doAdd(){
  const e=S.modal.env;
  if(!e.name.trim())return;
  if(e.etype!=='variable'&&!e.target)return;
  if(e.etype==='savings'){
    S.savings.push({id:S.nextId++,name:e.name.trim(),icon:e.icon,target:parseFloat(e.target)||0,balance:0,transactions:[]});
  } else {
    S.envelopes.push({id:S.nextId++,name:e.name.trim(),icon:e.icon,type:e.etype,target:parseFloat(e.target)||0,balance:0,dueDay:e.dueDay?parseInt(e.dueDay):null,transactions:[],history:[]});
  }
  closeMB();saveState();render();
}
function doEdit(){
  const m=S.modal;const all=[...S.envelopes,...S.savings];const env=all.find(e=>e.id===m.id);
  if(env){
    if(m.name&&m.name.trim())env.name=m.name.trim();
    if(m.icon)env.icon=m.icon;
    env.balance=parseFloat(m.balance)||0;
    env.target=parseFloat(m.target)||env.target;
    if(env.dueDay!==undefined)env.dueDay=m.dueDay?parseInt(m.dueDay):null;
  }
  closeMB();saveState();render();
}
function doDelete(){
  const id=S.modal.id;
  S.envelopes=S.envelopes.filter(e=>e.id!==id);S.savings=S.savings.filter(e=>e.id!==id);
  closeMB();saveState();render();
}
function openEditIncomeModal(idx){
  const entry=S.incomeLog[idx];
  S.modal={type:'editincome',idx,label:entry.label,amount:entry.amount,itype:entry.type};
  renderModal();openModalEl();
}
function doEditIncome(){
  const m=S.modal;
  const newAmt=parseFloat(m.amount);
  if(isNaN(newAmt)||newAmt<=0)return;
  const oldAmt=S.incomeLog[m.idx].amount;
  S.unallocated+=(newAmt-oldAmt);
  S.incomeLog[m.idx].amount=newAmt;
  S.incomeLog[m.idx].label=m.label||S.incomeLog[m.idx].label;
  S.incomeLog[m.idx].type=m.itype;
  closeMB();saveState();render();
  renderIncomePanel();
}
function doDeleteIncome(){
  const m=S.modal;
  S.unallocated-=S.incomeLog[m.idx].amount;
  S.incomeLog.splice(m.idx,1);
  closeMB();saveState();render();
  renderIncomePanel();
}
function updateSpendPreview(bal){
  const amt=parseFloat(document.getElementById('spend-amt').value)||0;
  const after=bal-amt;
  const el=document.getElementById('spend-after');
  if(el){el.textContent=fmt(after);el.className='si-val'+(after<0?' warn':'');}

function doFund(){
  const m=S.modal;const env=S.envelopes.find(e=>e.id===m.id);
  const amt=parseFloat(document.getElementById('fu-a').value);
  if(isNaN(amt)||amt<=0)return;
  const dir=m.dir||'add';
  const src=m.src||'unallocated';
  if(dir==='add'){
    if(src==='unallocated'){
      if(amt>S.unallocated){alert('Not enough unallocated funds.');return;}
      S.unallocated-=amt;
    }
    env.balance+=amt;
    env.transactions.unshift({desc:src==='direct'?'Add Directly':'Funded',amount:amt,date:fmtShort(today()),ts:Date.now()});
  } else {
    if(amt>env.balance){alert('Not enough balance in this envelope.');return;}
    env.balance-=amt;S.unallocated+=amt;
    env.transactions.unshift({desc:'Returned to unallocated',amount:-amt,date:fmtShort(today()),ts:Date.now()});
  }
  closeMB();saveState();render();
}

function getAllTransactions(){
  const all=[];
  S.envelopes.forEach(env=>{
    env.transactions.forEach((t,i)=>{
      all.push({envId:env.id,txIdx:i,icon:env.icon,envName:env.name,envType:env.type,desc:t.desc,amount:t.amount,date:t.date});
    });
  });
  S.savings.forEach(sav=>{
    sav.transactions.forEach((t,i)=>{
      all.push({envId:sav.id,txIdx:i,icon:sav.icon,envName:sav.name,envType:'savings',desc:t.desc,amount:t.amount,date:t.date});
    });
  });
  all.sort((a,b)=>{
    // Use stored timestamp if available, otherwise parse date string
    const ta=a.ts||(()=>{const d=new Date(a.date+' 2026');return isNaN(d)?0:d.getTime();})();
    const tb=b.ts||(()=>{const d=new Date(b.date+' 2026');return isNaN(d)?0:d.getTime();})();
    return tb-ta;
  });
  return all;
}

function openEditTxModal(envId,txIdx){
  const allEnvs=[...S.envelopes,...S.savings];
  const env=allEnvs.find(e=>e.id===envId);
  if(!env)return;
  const tx=env.transactions[txIdx];
  if(!tx)return;
  S.modal={type:'edittx',envId,txIdx,desc:tx.desc,amount:Math.abs(tx.amount),isNeg:tx.amount<0};
  renderModal();
  document.getElementById('modal-backdrop').style.display='flex';
}

function doEditTx(){
  const m=S.modal;
  const allEnvs=[...S.envelopes,...S.savings];
  const env=allEnvs.find(e=>e.id===m.envId);
  if(!env)return;
  const tx=env.transactions[m.txIdx];
  const newAmt=parseFloat(document.getElementById('edittx-amt').value);
  const newDesc=document.getElementById('edittx-desc').value||tx.desc;
  if(isNaN(newAmt)||newAmt<=0)return;
  const oldSigned=tx.amount;
  const newSigned=m.isNeg?-newAmt:newAmt;
  // adjust envelope balance by the difference
  env.balance+=(newSigned-oldSigned);
  tx.amount=newSigned;
  tx.desc=newDesc;
  closeMB();saveState();render();
  if(document.getElementById('tab-transactions').classList.contains('active'))renderTransactions();
}

function doDeleteTx(){
  const m=S.modal;
  const allEnvs=[...S.envelopes,...S.savings];
  const env=allEnvs.find(e=>e.id===m.envId);
  if(!env)return;
  const tx=env.transactions[m.txIdx];
  if(!tx)return;
  // Reverse this transaction's effect on balance
  env.balance-=tx.amount;
  env.transactions.splice(m.txIdx,1);
  // If it's a transfer, reverse the paired transaction too
  if(tx.desc.startsWith('Transfer to ')){
    const toName=tx.desc.replace('Transfer to ','');
    const paired=allEnvs.find(e=>e.name===toName);
    if(paired){
      const pidx=paired.transactions.findIndex(t=>t.desc===`Transfer from ${env.name}`&&t.amount===-tx.amount);
      if(pidx>=0){paired.balance-=paired.transactions[pidx].amount;paired.transactions.splice(pidx,1);}
    }
  } else if(tx.desc.startsWith('Transfer from ')){
    const fromName=tx.desc.replace('Transfer from ','');
    const paired=allEnvs.find(e=>e.name===fromName);
    if(paired){
      const pidx=paired.transactions.findIndex(t=>t.desc===`Transfer to ${env.name}`&&t.amount===-tx.amount);
      if(pidx>=0){paired.balance-=paired.transactions[pidx].amount;paired.transactions.splice(pidx,1);}
    }
  }
  closeMB();saveState();render();
  if(document.getElementById('tab-transactions').classList.contains('active'))renderTransactions();
}

  initCalMonth();

  if(calMonth.month<0){calMonth.month=11;calMonth.year--;}
  else if(calMonth.month>11){calMonth.month=0;calMonth.year++;}
  renderCalendar();
}

function calGoToday(){
  const t=today();
  calMonth={year:t.getFullYear(),month:t.getMonth()};

}

function getMonthLabel(){
  initCalMonth();
  const d=new Date(calMonth.year,calMonth.month,1);

// returns {bills, txs, pays} for a given date
function getCalEvents(dateObj){
  const t=today();t.setHours(0,0,0,0);
  const dy=dateObj.getDate();
  const inCurMonth=dateObj.getFullYear()===t.getFullYear()&&dateObj.getMonth()===t.getMonth();
  const bills=[];
  const txs=[];
  const pays=[];

  // Bills due on this day (only for current month view since they repeat)
  if(inCurMonth||dateObj>=t){
    S.envelopes.forEach(env=>{
      if(env.type==='fixed'&&env.dueDay===dy&&dateObj.getMonth()===calMonth.month&&dateObj.getFullYear()===calMonth.year){
        const funded=env.balance>=env.target;
        bills.push({env,funded});
      }
    });
  }

  // Transactions on this date — only real spends and income, no funding/session/transfer
  const fundingDescs=['Funded','Budget Session','Added Directly','Direct Deposit','Returned to unallocated','Deposit'];
  const isFiltered=desc=>fundingDescs.some(f=>desc===f)||desc.startsWith('Transfer')||desc.startsWith('Budget Session');
  const short=fmtShort(dateObj);
  S.envelopes.forEach(env=>{
    env.transactions.forEach((tx,idx)=>{
      if(tx.date===short&&!isFiltered(tx.desc)){
        txs.push({envId:env.id,icon:env.icon,envName:env.name,desc:tx.desc,amount:tx.amount,txIdx:idx});
      }
    });
  });
  S.savings.forEach(sav=>{
    sav.transactions.forEach((tx,idx)=>{
      if(tx.date===short&&!isFiltered(tx.desc)){
        txs.push({envId:sav.id,icon:sav.icon,envName:sav.name,desc:tx.desc,amount:tx.amount,txIdx:idx});
      }
    });
  });

  // Pay dates
  const allPays=getPaydays();
  allPays.forEach(p=>{
    if(p.date.getFullYear()===dateObj.getFullYear()&&p.date.getMonth()===dateObj.getMonth()&&p.date.getDate()===dy){
      pays.push(p);
    }
  });

  // Income logged on this date
  const incomes=[];
  S.incomeLog.forEach((l,i)=>{
    if(l.date===short){
      incomes.push({idx:i,label:l.label,amount:l.amount,itype:l.type});
    }
  });

  return {bills,txs,pays,incomes};
}

function renderCalendar(){
  initCalMonth();
  const container=document.getElementById('calendar-panel');
  const firstOfMonth=new Date(calMonth.year,calMonth.month,1);
  const lastOfMonth=new Date(calMonth.year,calMonth.month+1,0);
  const startDay=firstOfMonth.getDay(); // 0=Sun
  const daysInMonth=lastOfMonth.getDate();
  const t=today();t.setHours(0,0,0,0);

  // Build 42 cells (6 weeks × 7 days)
  const cells=[];
  // Leading empty from previous month
  const prevMonthLast=new Date(calMonth.year,calMonth.month,0).getDate();
  for(let i=startDay-1;i>=0;i--){
    cells.push({date:new Date(calMonth.year,calMonth.month-1,prevMonthLast-i),otherMonth:true});
  }
  for(let d=1;d<=daysInMonth;d++){
    cells.push({date:new Date(calMonth.year,calMonth.month,d),otherMonth:false});
  }
  while(cells.length<42){
    const last=cells[cells.length-1].date;
    cells.push({date:addDays(last,1),otherMonth:true});
  }
  // Trim to exactly needed rows
  while(cells.length>35&&cells[cells.length-1].otherMonth&&cells[cells.length-8].otherMonth)cells.pop();

  const weekdays=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const cellsHtml=cells.map(c=>{
    const dt=c.date;
    const isToday=dt.getFullYear()===t.getFullYear()&&dt.getMonth()===t.getMonth()&&dt.getDate()===t.getDate();
    const ev=getCalEvents(dt);

    // Build tiny labels — show up to 2 items inline, rest as dots
    const labels=[];
    ev.pays.forEach(p=>labels.push({cls:p.type==='biweekly'?'pay':'ret',text:p.type==='biweekly'?'💰 Pay':'💼 Ret'}));
    ev.bills.forEach(b=>labels.push({cls:b.funded?'bill-paid':'bill',text:b.env.icon+' '+b.env.name}));
    ev.incomes.forEach(inc=>labels.push({cls:'pay',text:'💵 '+inc.label.split(' ')[0]}));
    const visible=labels.slice(0,2);
    const extraCount=labels.length-visible.length+ev.txs.length;

    let itemsHtml=visible.map(l=>`<div class="cal-item ${l.cls}">${l.text}</div>`).join('');
    if(extraCount>0||ev.txs.length>0){
      const totalHidden=Math.max(0,labels.length-visible.length)+ev.txs.length;
      if(totalHidden>0)itemsHtml+=`<div class="cal-more">+${totalHidden} more</div>`;
    }

    const iso=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    return `<div class="cal-cell${isToday?' today':''}${c.otherMonth?' other-month':''}" onclick="openDayModal('${iso}')">
      <div class="cal-day-num">${dt.getDate()}</div>
      ${itemsHtml}
    </div>`;
  }).join('');

  container.innerHTML=`
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="cal-month-label">${getMonthLabel()}</div>
        <button class="btn btn-sm" onclick="calGoToday()" style="font-size:10px;">Today</button>
      </div>
      <button class="cal-nav-btn" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-weekdays">${weekdays.map(w=>`<div class="cal-wd">${w}</div>`).join('')}</div>
    <div class="cal-grid">${cellsHtml}</div>
    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--rose);"></div>Paycheck</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--info);"></div>Retainer</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--danger);"></div>Bill due</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--success);"></div>Funded</div>
    </div>`;
}

function toggleInsight(key){
  insightOpen[key]=!insightOpen[key];
  render();
}

function renderInsights(){
  const fixed=S.envelopes.filter(e=>e.type==='fixed');
  const variable=S.envelopes.filter(e=>e.type==='variable');
  const billsTotal=fixed.reduce((a,e)=>a+e.target,0);
  let html='';

  // Fixed bills
  if(fixed.length){
    const open=insightOpen.bills;
    html+=`<div class="insight-card">
      <div class="insight-card-header" onclick="toggleInsight('bills')">
        <div class="insight-title">Fixed Bills — ${fmt(billsTotal)}/mo</div>
        <span class="insight-chevron${open?' open':''}">▼</span>
      </div>
      ${open?`<div class="insight-body">
        ${fixed.map(env=>{const pct=Math.min(100,Math.round((env.balance/env.target)*100));const c=pct>=100?'var(--success)':pct>=50?'var(--warning)':'var(--danger)';
          return`<div class="trend-bar-row"><div class="trend-label">${env.icon} ${env.name}</div>
            <div class="trend-bar-bg"><div class="trend-bar-fill" style="width:${pct}%;background:${c};"></div></div>
            <div class="trend-val" style="font-size:9px;">${fmt(env.balance)}/${fmt(env.target)}</div></div>`;}).join('')}
      </div>`:''}
    </div>`;
  }

  // Variable spending
  if(variable.length){
    const open=insightOpen.variable;
    html+=`<div class="insight-card">
      <div class="insight-card-header" onclick="toggleInsight('variable')">
        <div class="insight-title">Variable Spending</div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${open?`<div class="period-toggle" onclick="event.stopPropagation()">
            <button class="period-btn${S.period===30?' active':''}" onclick="setPeriod(30,this)">30d</button>
            <button class="period-btn${S.period===60?' active':''}" onclick="setPeriod(60,this)">60d</button>
            <button class="period-btn${S.period===90?' active':''}" onclick="setPeriod(90,this)">90d</button>
          </div>`:''}
          <span class="insight-chevron${open?' open':''}">▼</span>
        </div>
      </div>
      ${open?`<div class="insight-body">
        ${variable.map(env=>{const spent=env.transactions.filter(t=>t.amount<0).reduce((a,t)=>a+Math.abs(t.amount),0);const pct=env.target>0?Math.min(100,Math.round((spent/env.target)*100)):0;const c=pct>=100?'var(--danger)':pct>=75?'var(--warning)':'var(--success)';
          return`<div class="trend-bar-row"><div class="trend-label">${env.icon} ${env.name}</div>
            <div class="trend-bar-bg"><div class="trend-bar-fill" style="width:${pct}%;background:${c};"></div></div>
            <div class="trend-val">${fmt(spent)}</div></div>`;}).join('')}
      </div>`:''}
    </div>`;
  }

  // Funding suggestions
  const suggestions=S.envelopes.filter(env=>{const rec=Math.ceil(getAvg(env)*100)/100;return Math.abs(rec-env.target)>=1;});
  if(suggestions.length){
    const open=insightOpen.suggestions;
    html+=`<div class="insight-card">
      <div class="insight-card-header" onclick="toggleInsight('suggestions')">
        <div class="insight-title">Funding Suggestions</div>
        <span class="insight-chevron${open?' open':''}">▼</span>
      </div>
      ${open?`<div class="insight-body">
        ${suggestions.map(env=>{const rec=Math.ceil(getAvg(env)*100)/100;const diff=rec-env.target;
          const label=diff>0?`+${fmt(diff)} suggested`:`${fmt(diff)} suggested`;
          const lc=diff>0?'var(--warning)':'var(--success)';
          return`<div class="trend-bar-row" style="margin-bottom:2px;"><div class="trend-label">${env.icon} ${env.name}</div>
            <div style="flex:1;font-size:10px;color:var(--text2);">${fmt(rec)} suggested</div>
            <div class="trend-val" style="color:${lc};font-size:9px;">${label}</div></div>`;}).join('')}
      </div>`:''}
    </div>`;
  }

  return html;
}

      <div style="border-top:2px solid var(--border);padding-top:14px;display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:13px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;">Budget Total</div>

  document.getElementById('sections-container').innerHTML=html;
}

// --- SERVICE WORKER (inline blob so single-file works) ---
if('serviceWorker' in navigator){
  const sw=`const C='vesper-v1';const A=['./'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)).then(()=>self.skipWaiting()));});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
